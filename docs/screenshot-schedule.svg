<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720" font-family="'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif" font-size="13">
  <!-- Page background -->
  <rect width="900" height="720" fill="#f5f5f0"/>

  <!-- LuCI top nav -->
  <rect width="900" height="44" fill="#1a1a1a"/>
  <text x="16" y="27" fill="#fff" font-size="15" font-weight="bold">OpenWrt</text>
  <text x="120" y="27" fill="#aaa" font-size="12">Status</text>
  <text x="175" y="27" fill="#aaa" font-size="12">System</text>
  <text x="230" y="27" fill="#fff" font-size="12" font-weight="600">Network ▾</text>
  <text x="300" y="27" fill="#aaa" font-size="12">Services</text>

  <!-- Breadcrumb -->
  <rect y="44" width="900" height="36" fill="#e8e8e8"/>
  <rect y="44" width="900" height="1" fill="#ccc"/>
  <text x="16" y="66" fill="#666" font-size="12">Network » Kids Network</text>
  <rect x="0" y="68" width="900" height="32" fill="#f0f0f0"/>
  <rect x="0" y="68" width="900" height="1" fill="#ddd"/>
  <rect x="10" y="68" width="110" height="32" fill="#fff" rx="3"/>
  <rect x="10" y="97" width="110" height="3" fill="#fff"/>
  <text x="65" y="88" fill="#337ab7" font-size="12" font-weight="600" text-anchor="middle">Dashboard</text>
  <text x="175" y="88" fill="#888" font-size="12" text-anchor="middle">Setup Wizard</text>

  <!-- Section heading -->
  <rect x="0" y="100" width="900" height="620" fill="#f5f5f0"/>
  <text x="16" y="130" fill="#333" font-size="18" font-weight="bold">Kids Network</text>

  <!-- Schedule section card -->
  <rect x="10" y="140" width="880" height="550" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="164" fill="#333" font-size="14" font-weight="bold">Bedtime Schedule</text>
  <text x="152" y="164" fill="#888" font-size="11">Up to 4 allowed time ranges per day</text>
  <rect x="10" y="170" width="880" height="1" fill="#eee"/>

  <!-- Access status banner — allowed (green) -->
  <rect x="24" y="180" width="852" height="44" rx="3" fill="#f0fff4" stroke="#5cb85c" stroke-width="1"/>
  <text x="40" y="200" fill="#2d6a2d" font-size="16">✔</text>
  <text x="62" y="198" fill="#2d6a2d" font-size="12" font-weight="bold">Internet access allowed</text>
  <text x="62" y="213" fill="#2d6a2d" font-size="11">No schedule block is active. Traffic flows normally through the kids network.</text>

  <!-- Info box -->
  <rect x="24" y="232" width="852" height="54" rx="3" fill="#d9edf7" stroke="#bce8f1" stroke-width="1"/>
  <text x="36" y="249" fill="#31708f" font-size="11" font-weight="bold">How this schedule works</text>
  <text x="36" y="263" fill="#31708f" font-size="11">During blocked hours the WiFi remains on — devices stay connected and keep their IP. A firewall rule silently drops</text>
  <text x="36" y="276" fill="#31708f" font-size="11">all internet traffic. DNS still resolves, so devices show as connected but cannot load pages or apps.</text>

  <!-- Preset dropdown + helper text row -->
  <text x="24" y="308" fill="#888" font-size="11">Leave a day empty for unrestricted access. Ranges must not overlap.</text>
  <rect x="700" y="295" width="176" height="26" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="788" y="312" fill="#555" font-size="11" text-anchor="middle">Apply preset…  ▾</text>

  <!-- Day rows -->
  <!-- Mon -->
  <rect x="24" y="324" width="852" height="36" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <text x="36" y="346" fill="#333" font-size="12" font-weight="600">Mon</text>
  <!-- Range pill -->
  <rect x="80" y="330" width="210" height="24" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="106" y="346" fill="#555" font-size="11" font-family="monospace">06:00</text>
  <text x="160" y="346" fill="#888" font-size="11">→</text>
  <text x="176" y="346" fill="#555" font-size="11" font-family="monospace">20:00</text>
  <rect x="296" y="334" width="18" height="16" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="305" y="345" fill="#d9534f" font-size="10" text-anchor="middle">✕</text>
  <rect x="826" y="330" width="40" height="24" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="846" y="346" fill="#555" font-size="11" text-anchor="middle">+ Add</text>

  <!-- Tue -->
  <rect x="24" y="366" width="852" height="36" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <text x="36" y="388" fill="#333" font-size="12" font-weight="600">Tue</text>
  <rect x="80" y="372" width="210" height="24" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="106" y="388" fill="#555" font-size="11" font-family="monospace">06:00</text>
  <text x="160" y="388" fill="#888" font-size="11">→</text>
  <text x="176" y="388" fill="#555" font-size="11" font-family="monospace">20:00</text>
  <rect x="296" y="376" width="18" height="16" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="305" y="387" fill="#d9534f" font-size="10" text-anchor="middle">✕</text>
  <rect x="826" y="372" width="40" height="24" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="846" y="388" fill="#555" font-size="11" text-anchor="middle">+ Add</text>

  <!-- Wed -->
  <rect x="24" y="408" width="852" height="36" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <text x="36" y="430" fill="#333" font-size="12" font-weight="600">Wed</text>
  <rect x="80" y="414" width="210" height="24" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="106" y="430" fill="#555" font-size="11" font-family="monospace">06:00</text>
  <text x="160" y="430" fill="#888" font-size="11">→</text>
  <text x="176" y="430" fill="#555" font-size="11" font-family="monospace">20:00</text>
  <rect x="296" y="418" width="18" height="16" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="305" y="429" fill="#d9534f" font-size="10" text-anchor="middle">✕</text>
  <rect x="826" y="414" width="40" height="24" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="846" y="430" fill="#555" font-size="11" text-anchor="middle">+ Add</text>

  <!-- Thu -->
  <rect x="24" y="450" width="852" height="36" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <text x="36" y="472" fill="#333" font-size="12" font-weight="600">Thu</text>
  <rect x="80" y="456" width="210" height="24" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="106" y="472" fill="#555" font-size="11" font-family="monospace">06:00</text>
  <text x="160" y="472" fill="#888" font-size="11">→</text>
  <text x="176" y="472" fill="#555" font-size="11" font-family="monospace">20:00</text>
  <rect x="296" y="460" width="18" height="16" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="305" y="471" fill="#d9534f" font-size="10" text-anchor="middle">✕</text>
  <rect x="826" y="456" width="40" height="24" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="846" y="472" fill="#555" font-size="11" text-anchor="middle">+ Add</text>

  <!-- Fri — two ranges -->
  <rect x="24" y="492" width="852" height="58" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <text x="36" y="516" fill="#333" font-size="12" font-weight="600">Fri</text>
  <rect x="80" y="498" width="210" height="24" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="106" y="514" fill="#555" font-size="11" font-family="monospace">06:00</text>
  <text x="160" y="514" fill="#888" font-size="11">→</text>
  <text x="176" y="514" fill="#555" font-size="11" font-family="monospace">13:00</text>
  <rect x="296" y="502" width="18" height="16" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="305" y="513" fill="#d9534f" font-size="10" text-anchor="middle">✕</text>
  <!-- Second range -->
  <rect x="80" y="526" width="210" height="24" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="106" y="542" fill="#555" font-size="11" font-family="monospace">16:00</text>
  <text x="160" y="542" fill="#888" font-size="11">→</text>
  <text x="176" y="542" fill="#555" font-size="11" font-family="monospace">21:00</text>
  <rect x="296" y="530" width="18" height="16" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="305" y="541" fill="#d9534f" font-size="10" text-anchor="middle">✕</text>
  <rect x="826" y="510" width="40" height="24" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="846" y="526" fill="#555" font-size="11" text-anchor="middle">+ Add</text>

  <!-- Sat -->
  <rect x="24" y="556" width="852" height="36" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <text x="36" y="578" fill="#333" font-size="12" font-weight="600">Sat</text>
  <rect x="80" y="562" width="210" height="24" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="106" y="578" fill="#555" font-size="11" font-family="monospace">08:00</text>
  <text x="160" y="578" fill="#888" font-size="11">→</text>
  <text x="176" y="578" fill="#555" font-size="11" font-family="monospace">21:00</text>
  <rect x="296" y="566" width="18" height="16" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="305" y="577" fill="#d9534f" font-size="10" text-anchor="middle">✕</text>
  <rect x="826" y="562" width="40" height="24" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="846" y="578" fill="#555" font-size="11" text-anchor="middle">+ Add</text>

  <!-- Sun — unrestricted -->
  <rect x="24" y="598" width="852" height="36" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <text x="36" y="620" fill="#333" font-size="12" font-weight="600">Sun</text>
  <text x="80" y="620" fill="#aaa" font-size="11">(unrestricted)</text>
  <rect x="826" y="604" width="40" height="24" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="846" y="620" fill="#555" font-size="11" text-anchor="middle">+ Add</text>

  <!-- Save button -->
  <rect x="24" y="646" width="140" height="30" rx="3" fill="#337ab7"/>
  <text x="94" y="665" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Save &amp; Apply All</text>

  <!-- Bottom label -->
  <text x="450" y="712" fill="#aaa" font-size="10" text-anchor="middle">luci-app-parental-privacy-vlan v1.3.0 — Bedtime Schedule</text>
</svg>
