  <text x="140" y="306" fill="#888" font-size="11">SSID, password, band</text>
  <rect x="10" y="312" width="880" height="1" fill="#eee"/>
  <!-- SSID field -->
  <text x="24" y="334" fill="#555" font-size="11" font-weight="600">SSID — Network Name</text>
  <rect x="24" y="340" width="380" height="28" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="34" y="358" fill="#333" font-size="12">HomeNet_Kids</text>
  <text x="24" y="380" fill="#337ab7" font-size="11">↺ Use suggested name: HomeNet_Kids</text>
  <!-- Password field -->
  <text x="450" y="334" fill="#555" font-size="11" font-weight="600">Password</text>
  <rect x="450" y="340" width="380" height="28" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="460" y="358" fill="#bbb" font-size="12">••••••••••••</text>
  <text x="450" y="380" fill="#888" font-size="11">Minimum 8 characters for WPA2-PSK encryption.</text>

  <!-- Band radio cards -->
  <text x="24" y="406" fill="#555" font-size="11" font-weight="600">Frequency Band</text>
  <!-- 2.4GHz selected -->
  <rect x="24" y="414" width="120" height="68" rx="3" fill="#f0f8ff" stroke="#337ab7" stroke-width="2"/>
  <text x="84" y="436" fill="#333" font-size="12" font-weight="600" text-anchor="middle">2.4 GHz</text>
  <text x="84" y="452" fill="#337ab7" font-size="10" text-anchor="middle" font-family="monospace">radio0</text>
  <text x="84" y="467" fill="#666" font-size="10" text-anchor="middle">Better range through walls.</text>
  <!-- 5GHz -->
  <rect x="154" y="414" width="120" height="68" rx="3" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <text x="214" y="436" fill="#333" font-size="12" font-weight="600" text-anchor="middle">5 GHz</text>
  <text x="214" y="452" fill="#337ab7" font-size="10" text-anchor="middle" font-family="monospace">radio1</text>
  <text x="214" y="467" fill="#666" font-size="10" text-anchor="middle">Faster speeds, shorter range.</text>
  <!-- 6GHz -->
  <rect x="284" y="414" width="120" height="68" rx="3" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <text x="344" y="436" fill="#333" font-size="12" font-weight="600" text-anchor="middle">6 GHz</text>
  <text x="344" y="452" fill="#337ab7" font-size="10" text-anchor="middle" font-family="monospace">radio2</text>
  <text x="344" y="467" fill="#666" font-size="10" text-anchor="middle">Ultra-fast Wi-Fi 6E/7.</text>
  <!-- All Bands -->
  <rect x="414" y="414" width="120" height="68" rx="3" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <text x="474" y="436" fill="#333" font-size="12" font-weight="600" text-anchor="middle">All Bands</text>
  <text x="474" y="452" fill="#337ab7" font-size="10" text-anchor="middle" font-family="monospace">Sync All</text>
  <text x="474" y="467" fill="#666" font-size="10" text-anchor="middle">Unified SSID across all radios.</text>

  <!-- DNS & Content Filtering section -->
