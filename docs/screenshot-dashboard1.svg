  <text x="24" y="162" fill="#666" font-size="12">All settings for your children's WiFi — managed in one place.</text>
  <!-- Pill toggle ON -->
  <rect x="774" y="148" width="44" height="24" rx="12" fill="#5cb85c"/>
  <circle cx="800" cy="160" r="9" fill="#fff"/>
  <text x="824" y="165" fill="#333" font-size="12" font-weight="600">Kids WiFi Active</text>

  <!-- Stat cards -->
  <!-- Card 1: Devices -->
  <rect x="24" y="176" width="158" height="76" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="24" y="176" width="158" height="3" fill="#5cb85c" rx="2"/>
  <text x="34" y="210" fill="#5cb85c" font-size="22" font-weight="bold">3</text>
  <text x="34" y="242" fill="#888" font-size="10" letter-spacing="0.4">DEVICES ONLINE</text>

  <!-- Card 2: SSID -->
  <rect x="192" y="176" width="158" height="76" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="192" y="176" width="158" height="3" fill="#337ab7" rx="2"/>
  <text x="202" y="210" fill="#337ab7" font-size="13" font-weight="bold">HomeNet_Kids</text>
  <text x="202" y="242" fill="#888" font-size="10" letter-spacing="0.4">ACTIVE SSID</text>

  <!-- Card 3: DNS -->
  <rect x="360" y="176" width="158" height="76" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="360" y="176" width="158" height="3" fill="#f0ad4e" rx="2"/>
  <text x="370" y="210" fill="#f0ad4e" font-size="14" font-weight="bold">1.1.1.3</text>
  <text x="370" y="242" fill="#888" font-size="10" letter-spacing="0.4">DNS RESOLVER</text>

  <!-- Card 4: Schedule -->
  <rect x="528" y="176" width="158" height="76" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="528" y="176" width="158" height="3" fill="#9b59b6" rx="2"/>
  <text x="538" y="210" fill="#9b59b6" font-size="13" font-weight="bold">ON until 20:00</text>
  <text x="538" y="242" fill="#888" font-size="10" letter-spacing="0.4">SCHEDULE</text>

  <!-- Card 5: Internet Access -->
  <rect x="696" y="176" width="178" height="76" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="696" y="176" width="178" height="3" fill="#5cb85c" rx="2"/>
  <text x="706" y="210" fill="#5cb85c" font-size="14" font-weight="bold">Allowed</text>
  <text x="706" y="242" fill="#888" font-size="10" letter-spacing="0.4">INTERNET ACCESS</text>

