  <text x="24" y="510" fill="#555" font-size="11" font-weight="600">DNS Provider</text>

  <!-- DNS cards row 1 -->
  <!-- Cloudflare Family — selected -->
  <rect x="24" y="518" width="162" height="80" rx="3" fill="#f0f8ff" stroke="#337ab7" stroke-width="2"/>
  <rect x="30" y="524" width="52" height="14" rx="2" fill="none" stroke="#5cb85c" stroke-width="1"/>
  <text x="56" y="534" fill="#5cb85c" font-size="9" text-anchor="middle">FAMILY SAFE</text>
  <text x="34" y="550" fill="#333" font-size="11" font-weight="600">Cloudflare Family</text>
  <text x="34" y="564" fill="#337ab7" font-size="10" font-family="monospace">1.1.1.3 / 1.0.0.3</text>
  <text x="34" y="578" fill="#666" font-size="10">Blocks malware + adult content.</text>

  <!-- CleanBrowsing -->
  <rect x="196" y="518" width="162" height="80" rx="3" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <rect x="202" y="524" width="38" height="14" rx="2" fill="none" stroke="#f0ad4e" stroke-width="1"/>
  <text x="221" y="534" fill="#f0ad4e" font-size="9" text-anchor="middle">STRICT</text>
  <text x="206" y="550" fill="#333" font-size="11" font-weight="600">CleanBrowsing</text>
  <text x="206" y="564" fill="#337ab7" font-size="10" font-family="monospace">185.228.168.9</text>
  <text x="206" y="578" fill="#666" font-size="10">Blocks adult content, proxies.</text>

  <!-- OpenDNS -->
  <rect x="368" y="518" width="162" height="80" rx="3" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <rect x="374" y="524" width="52" height="14" rx="2" fill="none" stroke="#5cb85c" stroke-width="1"/>
  <text x="400" y="534" fill="#5cb85c" font-size="9" text-anchor="middle">FAMILY SAFE</text>
  <text x="378" y="550" fill="#333" font-size="11" font-weight="600">OpenDNS Family</text>
  <text x="378" y="564" fill="#337ab7" font-size="10" font-family="monospace">208.67.222.123</text>
  <text x="378" y="578" fill="#666" font-size="10">Cisco-backed. Blocks adult content.</text>

  <!-- Quad9 -->
  <rect x="540" y="518" width="150" height="80" rx="3" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <rect x="546" y="524" width="60" height="14" rx="2" fill="none" stroke="#337ab7" stroke-width="1"/>
  <text x="576" y="534" fill="#337ab7" font-size="9" text-anchor="middle">MALWARE ONLY</text>
  <text x="550" y="550" fill="#333" font-size="11" font-weight="600">Quad9 Secure</text>
  <text x="550" y="564" fill="#337ab7" font-size="10" font-family="monospace">9.9.9.11</text>
  <text x="550" y="578" fill="#666" font-size="10">Blocks malware/phishing only.</text>

  <!-- DoH toggle row -->
