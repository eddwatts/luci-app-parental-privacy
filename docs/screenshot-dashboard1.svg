  <text x="24" y="626" fill="#333" font-size="12" font-weight="600">Block DNS-over-HTTPS (DoH) bypass</text>
  <text x="24" y="641" fill="#888" font-size="11">Blocks known DoH providers so browsers cannot silently bypass the DNS filter</text>
  <rect x="848" y="618" width="36" height="20" rx="10" fill="#5cb85c"/>
  <circle cx="866" cy="628" r="8" fill="#fff"/>

  <!-- SafeSearch toggle row -->
  <rect x="24" y="654" width="852" height="1" fill="#f0f0f0"/>
  <text x="24" y="674" fill="#333" font-size="12" font-weight="600">SafeSearch enforcement</text>
  <text x="24" y="689" fill="#888" font-size="11">Forces SafeSearch on Google, Bing, YouTube and DuckDuckGo via DNS CNAME</text>
  <rect x="848" y="666" width="36" height="20" rx="10" fill="#5cb85c"/>
  <circle cx="866" cy="676" r="8" fill="#fff"/>

  <!-- Connected Devices section -->
  <rect x="10" y="694" width="880" height="136" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="716" fill="#333" font-size="14" font-weight="bold">Connected Devices</text>
  <text x="170" y="716" fill="#888" font-size="11">3 online</text>
  <rect x="10" y="722" width="880" height="1" fill="#eee"/>

  <!-- Device rows -->
  <!-- Device 1 -->
  <rect x="24" y="730" width="852" height="34" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <circle cx="38" cy="747" r="4" fill="#5cb85c"/>
  <text x="52" y="744" fill="#333" font-size="12" font-weight="600">Caitlin's iPad</text>
  <text x="52" y="758" fill="#888" font-size="10" font-family="monospace">a4:c3:f0:12:34:56</text>
  <text x="640" y="751" fill="#337ab7" font-size="10" font-family="monospace">172.28.28.101</text>
  <text x="730" y="751" fill="#888" font-size="10">exp 47m</text>
  <rect x="800" y="734" width="60" height="22" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="830" y="749" fill="#333" font-size="11" text-anchor="middle">Block</text>

  <!-- Device 2 -->
  <rect x="24" y="770" width="852" height="34" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <circle cx="38" cy="787" r="4" fill="#5cb85c"/>
  <text x="52" y="784" fill="#333" font-size="12" font-weight="600">Tom's Nintendo Switch</text>
  <text x="52" y="798" fill="#888" font-size="10" font-family="monospace">b8:27:eb:ab:cd:ef</text>
  <text x="640" y="791" fill="#337ab7" font-size="10" font-family="monospace">172.28.28.102</text>
  <text x="730" y="791" fill="#888" font-size="10">exp 51m</text>
  <rect x="800" y="774" width="60" height="22" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="830" y="789" fill="#333" font-size="11" text-anchor="middle">Block</text>

  <!-- Grant extension button -->
  <rect x="24" y="812" width="160" height="28" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="104" y="830" fill="#333" font-size="11" text-anchor="middle">⏱ Grant 1-hour extension</text>

  <!-- Save / Remove buttons -->
  <rect x="10" y="840" width="880" height="58" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="24" y="854" width="140" height="30" rx="3" fill="#337ab7"/>
  <text x="94" y="873" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Save &amp; Apply All</text>
  <rect x="174" y="854" width="150" height="30" rx="3" fill="#d9534f"/>
  <text x="249" y="873" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Remove Kids Network</text>

  <!-- Bottom label -->
  <text x="450" y="1010" fill="#aaa" font-size="10" text-anchor="middle">luci-app-parental-privacy-vlan v1.3.0 — VLAN mode</text>
</svg>
