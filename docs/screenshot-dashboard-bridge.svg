<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1120" viewBox="0 0 900 1120" font-family="'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif" font-size="13">
  <!-- Page background -->
  <rect width="900" height="1120" fill="#f5f5f0"/>

  <!-- LuCI top nav bar -->
  <rect width="900" height="44" fill="#1a1a1a"/>
  <text x="16" y="27" fill="#fff" font-size="15" font-weight="bold">OpenWrt</text>
  <text x="120" y="27" fill="#aaa" font-size="12">Status</text>
  <text x="175" y="27" fill="#aaa" font-size="12">System</text>
  <text x="230" y="27" fill="#fff" font-size="12" font-weight="600">Network ▾</text>
  <text x="300" y="27" fill="#aaa" font-size="12">Services</text>
  <text x="360" y="27" fill="#aaa" font-size="12">Logout</text>

  <!-- Breadcrumb bar -->
  <rect y="44" width="900" height="36" fill="#e8e8e8"/>
  <rect y="44" width="900" height="1" fill="#ccc"/>
  <text x="16" y="66" fill="#666" font-size="12">Network » Kids Network</text>
  <!-- Tabs -->
  <rect x="0" y="68" width="900" height="32" fill="#f0f0f0"/>
  <rect x="0" y="68" width="900" height="1" fill="#ddd"/>
  <rect x="10" y="68" width="110" height="32" fill="#fff" rx="3" ry="3"/>
  <rect x="10" y="97" width="110" height="3" fill="#fff"/>
  <text x="65" y="88" fill="#337ab7" font-size="12" font-weight="600" text-anchor="middle">Dashboard</text>
  <text x="175" y="88" fill="#888" font-size="12" text-anchor="middle">Setup Wizard</text>

  <!-- Main content area -->
  <rect x="0" y="100" width="900" height="1020" fill="#f5f5f0"/>

  <!-- Page title -->
  <text x="16" y="130" fill="#333" font-size="18" font-weight="bold">Kids Network</text>

  <!-- ── Bridge mode warning banner ── -->
  <rect x="10" y="138" width="880" height="58" rx="3" fill="#fcf8e3" stroke="#faebcc" stroke-width="1"/>
  <text x="24" y="158" fill="#8a6d3b" font-size="13" font-weight="bold">⚠  Bridge mode active — Broadcom WiFi detected</text>
  <text x="24" y="176" fill="#8a6d3b" font-size="11">VLAN tagging is not supported on this hardware. WiFi devices are isolated automatically. To isolate wired devices, assign dedicated LAN ports below.</text>

  <!-- Top section: master toggle + stat bar -->
  <rect x="10" y="206" width="880" height="136" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="230" fill="#666" font-size="12">All settings for your children's WiFi — managed in one place.</text>
  <!-- Pill toggle ON -->
  <rect x="774" y="216" width="44" height="24" rx="12" fill="#5cb85c"/>
  <circle cx="800" cy="228" r="9" fill="#fff"/>
  <text x="824" y="233" fill="#333" font-size="12" font-weight="600">Kids WiFi Active</text>

  <!-- Stat cards -->
  <rect x="24" y="244" width="158" height="76" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="24" y="244" width="158" height="3" fill="#5cb85c" rx="2"/>
  <text x="34" y="278" fill="#5cb85c" font-size="22" font-weight="bold">2</text>
  <text x="34" y="310" fill="#888" font-size="10" letter-spacing="0.4">DEVICES ONLINE</text>

  <rect x="192" y="244" width="158" height="76" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="192" y="244" width="158" height="3" fill="#337ab7" rx="2"/>
  <text x="202" y="278" fill="#337ab7" font-size="13" font-weight="bold">HomeNet_Kids</text>
  <text x="202" y="310" fill="#888" font-size="10" letter-spacing="0.4">ACTIVE SSID</text>

  <rect x="360" y="244" width="158" height="76" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="360" y="244" width="158" height="3" fill="#f0ad4e" rx="2"/>
  <text x="370" y="278" fill="#f0ad4e" font-size="14" font-weight="bold">1.1.1.3</text>
  <text x="370" y="310" fill="#888" font-size="10" letter-spacing="0.4">DNS RESOLVER</text>

  <rect x="528" y="244" width="158" height="76" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="528" y="244" width="158" height="3" fill="#9b59b6" rx="2"/>
  <text x="538" y="278" fill="#9b59b6" font-size="13" font-weight="bold">ON until 20:00</text>
  <text x="538" y="310" fill="#888" font-size="10" letter-spacing="0.4">SCHEDULE</text>

  <rect x="696" y="244" width="178" height="76" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="696" y="244" width="178" height="3" fill="#5cb85c" rx="2"/>
  <text x="706" y="278" fill="#5cb85c" font-size="14" font-weight="bold">Allowed</text>
  <text x="706" y="310" fill="#888" font-size="10" letter-spacing="0.4">INTERNET ACCESS</text>

  <!-- WiFi Settings section (compact) -->
  <rect x="10" y="352" width="880" height="110" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="374" fill="#333" font-size="14" font-weight="bold">WiFi Settings</text>
  <text x="140" y="374" fill="#888" font-size="11">SSID, password, band</text>
  <rect x="10" y="380" width="880" height="1" fill="#eee"/>
  <text x="24" y="400" fill="#555" font-size="11" font-weight="600">SSID — Network Name</text>
  <rect x="24" y="406" width="380" height="28" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="34" y="424" fill="#333" font-size="12">HomeNet_Kids</text>
  <text x="450" y="400" fill="#555" font-size="11" font-weight="600">Password</text>
  <rect x="450" y="406" width="380" height="28" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="460" y="424" fill="#bbb" font-size="12">••••••••••••</text>
  <text x="24" y="450" fill="#337ab7" font-size="11">↺ Use suggested name: HomeNet_Kids</text>

  <!-- DNS section (compact) -->
  <rect x="10" y="472" width="880" height="100" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="494" fill="#333" font-size="14" font-weight="bold">DNS &amp; Content Filtering</text>
  <rect x="10" y="500" width="880" height="1" fill="#eee"/>
  <!-- DoH toggle -->
  <text x="24" y="522" fill="#333" font-size="12" font-weight="600">Block DNS-over-HTTPS (DoH) bypass</text>
  <rect x="848" y="512" width="36" height="20" rx="10" fill="#5cb85c"/>
  <circle cx="866" cy="522" r="8" fill="#fff"/>
  <rect x="24" y="534" width="852" height="1" fill="#f0f0f0"/>
  <!-- SafeSearch toggle -->
  <text x="24" y="554" fill="#333" font-size="12" font-weight="600">SafeSearch enforcement</text>
  <text x="24" y="566" fill="#888" font-size="11">Forces SafeSearch on Google, Bing, YouTube and DuckDuckGo via DNS CNAME</text>
  <rect x="848" y="544" width="36" height="20" rx="10" fill="#5cb85c"/>
  <circle cx="866" cy="554" r="8" fill="#fff"/>

  <!-- ── Wired Port Isolation section (bridge mode only) ── -->
  <rect x="10" y="582" width="880" height="188" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="604" fill="#333" font-size="14" font-weight="bold">Wired Port Isolation</text>
  <text x="176" y="604" fill="#888" font-size="11">Bridge mode — assign LAN ports to kids network</text>
  <rect x="10" y="610" width="880" height="1" fill="#eee"/>

  <!-- Info box -->
  <rect x="24" y="618" width="852" height="44" rx="3" fill="#d9edf7" stroke="#bce8f1" stroke-width="1"/>
  <text x="36" y="634" fill="#31708f" font-size="11">Your router uses Broadcom WiFi which does not support VLAN tagging. WiFi devices are already isolated.</text>
  <text x="36" y="650" fill="#31708f" font-size="11">To also isolate wired devices, move a LAN port to the kids network below.</text>

  <!-- Kids network ports label + tags -->
  <text x="24" y="682" fill="#555" font-size="11" font-weight="600">Kids network ports</text>
  <!-- Assigned port tag -->
  <rect x="24" y="690" width="68" height="24" rx="3" fill="#f0fff4" stroke="#5cb85c" stroke-width="1"/>
  <text x="36" y="706" fill="#2d6a2d" font-size="11">🌐 lan3</text>
  <text x="84" y="706" fill="#d9534f" font-size="12" font-weight="bold">✕</text>
  <text x="106" y="706" fill="#888" font-size="11" font-style="italic">Click ✕ to return a port to the main network.</text>

  <!-- Available ports label + tags -->
  <text x="24" y="730" fill="#555" font-size="11" font-weight="600">Available main network ports</text>
  <!-- lan1 tag -->
  <rect x="24" y="738" width="52" height="24" rx="3" fill="#f0f8ff" stroke="#337ab7" stroke-width="1"/>
  <text x="50" y="754" fill="#1a4a7a" font-size="11" text-anchor="middle">+ lan1</text>
  <!-- lan2 tag -->
  <rect x="84" y="738" width="52" height="24" rx="3" fill="#f0f8ff" stroke="#337ab7" stroke-width="1"/>
  <text x="110" y="754" fill="#1a4a7a" font-size="11" text-anchor="middle">+ lan2</text>
  <!-- lan4 tag -->
  <rect x="144" y="738" width="52" height="24" rx="3" fill="#f0f8ff" stroke="#337ab7" stroke-width="1"/>
  <text x="170" y="754" fill="#1a4a7a" font-size="11" text-anchor="middle">+ lan4</text>
  <text x="24" y="778" fill="#888" font-size="11" font-style="italic">Click a port to assign it to the kids network.</text>

  <!-- Connected Devices section -->
  <rect x="10" y="780" width="880" height="130" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="802" fill="#333" font-size="14" font-weight="bold">Connected Devices</text>
  <text x="170" y="802" fill="#888" font-size="11">2 online</text>
  <rect x="10" y="808" width="880" height="1" fill="#eee"/>

  <rect x="24" y="816" width="852" height="34" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <circle cx="38" cy="833" r="4" fill="#5cb85c"/>
  <text x="52" y="830" fill="#333" font-size="12" font-weight="600">Caitlin's iPad</text>
  <text x="52" y="844" fill="#888" font-size="10" font-family="monospace">a4:c3:f0:12:34:56</text>
  <text x="640" y="837" fill="#337ab7" font-size="10" font-family="monospace">172.28.28.101</text>
  <text x="730" y="837" fill="#888" font-size="10">exp 47m</text>
  <rect x="800" y="820" width="60" height="22" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="830" y="835" fill="#333" font-size="11" text-anchor="middle">Block</text>

  <rect x="24" y="856" width="852" height="34" rx="3" fill="#fff" stroke="#eee" stroke-width="1"/>
  <circle cx="38" cy="873" r="4" fill="#5cb85c"/>
  <text x="52" y="870" fill="#333" font-size="12" font-weight="600">Tom's Nintendo Switch</text>
  <text x="52" y="884" fill="#888" font-size="10" font-family="monospace">b8:27:eb:ab:cd:ef</text>
  <text x="640" y="877" fill="#337ab7" font-size="10" font-family="monospace">172.28.28.102</text>
  <text x="730" y="877" fill="#888" font-size="10">exp 51m</text>
  <rect x="800" y="860" width="60" height="22" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="830" y="875" fill="#333" font-size="11" text-anchor="middle">Block</text>

  <!-- Grant extension button -->
  <rect x="24" y="898" width="160" height="28" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="104" y="916" fill="#333" font-size="11" text-anchor="middle">⏱ Grant 1-hour extension</text>

  <!-- Save / Remove -->
  <rect x="10" y="922" width="880" height="58" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="24" y="936" width="140" height="30" rx="3" fill="#337ab7"/>
  <text x="94" y="955" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Save &amp; Apply All</text>
  <rect x="174" y="936" width="150" height="30" rx="3" fill="#d9534f"/>
  <text x="249" y="955" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Remove Kids Network</text>

  <!-- Bottom label -->
  <text x="450" y="1110" fill="#aaa" font-size="10" text-anchor="middle">luci-app-parental-privacy-vlan v1.3.0 — Bridge mode (Broadcom brcmfmac)</text>
</svg>
