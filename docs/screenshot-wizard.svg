<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" font-family="'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif" font-size="13">
  <!-- Page background -->
  <rect width="900" height="760" fill="#f5f5f0"/>

  <!-- LuCI top nav -->
  <rect width="900" height="44" fill="#1a1a1a"/>
  <text x="16" y="27" fill="#fff" font-size="15" font-weight="bold">OpenWrt</text>
  <text x="120" y="27" fill="#aaa" font-size="12">Status</text>
  <text x="175" y="27" fill="#aaa" font-size="12">System</text>
  <text x="230" y="27" fill="#fff" font-size="12" font-weight="600">Network ▾</text>
  <text x="300" y="27" fill="#aaa" font-size="12">Services</text>

  <!-- Breadcrumb -->
  <rect y="44" width="900" height="36" fill="#e8e8e8"/>
  <rect y="44" width="900" height="1" fill="#ccc"/>
  <text x="16" y="66" fill="#666" font-size="12">Network » Kids Network » Setup Wizard</text>
  <rect x="0" y="68" width="900" height="32" fill="#f0f0f0"/>
  <rect x="0" y="68" width="900" height="1" fill="#ddd"/>
  <text x="65" y="88" fill="#888" font-size="12" text-anchor="middle">Dashboard</text>
  <rect x="130" y="68" width="110" height="32" fill="#fff" rx="3"/>
  <rect x="130" y="97" width="110" height="3" fill="#fff"/>
  <text x="185" y="88" fill="#337ab7" font-size="12" font-weight="600" text-anchor="middle">Setup Wizard</text>

  <!-- Main content -->
  <rect x="0" y="100" width="900" height="660" fill="#f5f5f0"/>
  <text x="16" y="130" fill="#333" font-size="18" font-weight="bold">Parental Privacy Wizard</text>

  <!-- Bridge mode warning banner -->
  <rect x="10" y="138" width="880" height="46" rx="3" fill="#fcf8e3" stroke="#faebcc" stroke-width="1"/>
  <text x="24" y="157" fill="#8a6d3b" font-size="13" font-weight="bold">⚠  Bridge mode active</text>
  <text x="24" y="173" fill="#8a6d3b" font-size="11">Broadcom WiFi detected. VLAN tagging is not supported. WiFi isolation is automatic. Assign LAN ports in step 4 for wired isolation.</text>

  <!-- 4-step tab bar -->
  <rect x="10" y="194" width="880" height="36" rx="0" fill="none"/>
  <line x1="10" y1="230" x2="890" y2="230" stroke="#ddd" stroke-width="2"/>

  <!-- Tab 1: done (green tick) -->
  <text x="106" y="218" fill="#5cb85c" font-size="12" font-weight="600" text-anchor="middle">✓ 1. Primary DNS</text>
  <line x1="10" y1="230" x2="202" y2="230" stroke="#5cb85c" stroke-width="2"/>

  <!-- Tab 2: active -->
  <rect x="202" y="194" width="216" height="36" fill="none"/>
  <text x="310" y="218" fill="#337ab7" font-size="12" font-weight="600" text-anchor="middle">2. Kids WiFi</text>
  <line x1="202" y1="230" x2="418" y2="230" stroke="#337ab7" stroke-width="2"/>

  <!-- Tab 3: inactive -->
  <text x="526" y="218" fill="#888" font-size="12" text-anchor="middle">3. Hardware Button</text>

  <!-- Tab 4: inactive (bridge mode only) -->
  <text x="742" y="218" fill="#888" font-size="12" text-anchor="middle">4. LAN Ports</text>

  <!-- Step 2 content: Kids WiFi -->
  <rect x="10" y="236" width="880" height="490" fill="#fff" rx="3" stroke="#ddd" stroke-width="1"/>

  <text x="24" y="262" fill="#333" font-size="15" font-weight="bold">Kids WiFi Fortress</text>

  <!-- Info box -->
  <rect x="24" y="270" width="852" height="40" rx="3" fill="#d9edf7" stroke="#bce8f1" stroke-width="1"/>
  <text x="36" y="286" fill="#31708f" font-size="11">This creates a separate WiFi on its own subnet. DHCP Option 6 forces every connected device to use a family-safe DNS —</text>
  <text x="36" y="300" fill="#31708f" font-size="11">and a firewall rule blocks any attempt to bypass it. No accounts or ID checks ever required.</text>

  <!-- SSID + Password fields -->
  <text x="24" y="330" fill="#555" font-size="11" font-weight="600">Network Name (SSID)</text>
  <rect x="24" y="337" width="398" height="28" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="34" y="355" fill="#333" font-size="12">HomeNet_Kids</text>
  <text x="450" y="330" fill="#555" font-size="11" font-weight="600">Password (min. 8 characters)</text>
  <rect x="450" y="337" width="420" height="28" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="460" y="355" fill="#bbb" font-size="12">••••••••••••</text>

  <!-- DNS provider heading -->
  <text x="24" y="386" fill="#333" font-size="13" font-weight="bold">Choose Family DNS</text>

  <!-- DNS cards -->
  <!-- Cloudflare Families — selected -->
  <rect x="24" y="395" width="268" height="82" rx="3" fill="#f0f8ff" stroke="#337ab7" stroke-width="2"/>
  <rect x="32" y="401" width="58" height="14" rx="2" fill="none" stroke="#5cb85c" stroke-width="1"/>
  <text x="61" y="411" fill="#5cb85c" font-size="9" text-anchor="middle">FAMILY SAFE</text>
  <text x="32" y="428" fill="#333" font-size="12" font-weight="600">Cloudflare for Families</text>
  <text x="32" y="444" fill="#337ab7" font-size="11" font-family="monospace">1.1.1.3</text>
  <text x="32" y="460" fill="#666" font-size="11">Blocks malware and adult content. No account needed.</text>
  <!-- CleanBrowsing -->
  <rect x="302" y="395" width="268" height="82" rx="3" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <rect x="310" y="401" width="38" height="14" rx="2" fill="none" stroke="#f0ad4e" stroke-width="1"/>
  <text x="329" y="411" fill="#f0ad4e" font-size="9" text-anchor="middle">STRICT</text>
  <text x="310" y="428" fill="#333" font-size="12" font-weight="600">CleanBrowsing</text>
  <text x="310" y="444" fill="#337ab7" font-size="11" font-family="monospace">185.228.168.9</text>
  <text x="310" y="460" fill="#666" font-size="11">Strict family filter — blocks adult content, proxies.</text>
  <!-- OpenDNS -->
  <rect x="580" y="395" width="290" height="82" rx="3" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <rect x="588" y="401" width="58" height="14" rx="2" fill="none" stroke="#5cb85c" stroke-width="1"/>
  <text x="617" y="411" fill="#5cb85c" font-size="9" text-anchor="middle">FAMILY SAFE</text>
  <text x="588" y="428" fill="#333" font-size="12" font-weight="600">OpenDNS FamilyShield</text>
  <text x="588" y="444" fill="#337ab7" font-size="11" font-family="monospace">208.67.222.123</text>
  <text x="588" y="460" fill="#666" font-size="11">Cisco-backed. No account required.</text>

  <!-- Toggles box -->
  <rect x="24" y="488" width="852" height="84" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <!-- SafeSearch row -->
  <text x="36" y="510" fill="#333" font-size="12" font-weight="600">Force SafeSearch</text>
  <text x="36" y="524" fill="#888" font-size="11">Enforces safe results on Google, Bing, and YouTube Restricted Mode at DNS level — no device cooperation needed.</text>
  <rect x="848" y="502" width="36" height="20" rx="10" fill="#5cb85c"/>
  <circle cx="866" cy="512" r="8" fill="#fff"/>
  <rect x="24" y="532" width="852" height="1" fill="#eee"/>
  <!-- DoH row -->
  <text x="36" y="552" fill="#333" font-size="12" font-weight="600">Block DNS-over-HTTPS bypass</text>
  <text x="36" y="564" fill="#888" font-size="11">Prevents browsers silently bypassing the DNS filter using encrypted DNS. Recommended.</text>
  <rect x="848" y="544" width="36" height="20" rx="10" fill="#5cb85c"/>
  <circle cx="866" cy="554" r="8" fill="#fff"/>

  <!-- Navigation buttons -->
  <rect x="24" y="590" width="80" height="30" rx="3" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="64" y="609" fill="#555" font-size="12" text-anchor="middle">← Back</text>
  <rect x="750" y="590" width="136" height="30" rx="3" fill="#337ab7"/>
  <text x="818" y="609" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Next: Hardware Button →</text>

  <!-- Bottom label -->
  <text x="450" y="750" fill="#aaa" font-size="10" text-anchor="middle">luci-app-parental-privacy-vlan v1.3.0 — Setup Wizard (bridge mode, step 2 of 4)</text>
</svg>
